# https://github.com/evilmartians/lefthook
pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{ts,tsx,js,jsx,json,md,yml,yaml,css}'
      run: pnpm exec prettier --write {staged_files} && git add {staged_files}
    eslint:
      glob: '*.{ts,tsx,js,jsx}'
      run: pnpm exec eslint --fix {staged_files} && git add {staged_files}
    typecheck:
      run: pnpm typecheck

pre-push:
  parallel: true
  commands:
    test:
      run: pnpm test
    build:
      run: pnpm build
